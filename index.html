<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Image Viewer</title>
<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}
img{
    max-width:90%;
    max-height:90vh;
    margin-top:20px;
    box-shadow:0 0 20px #000;
}
</style>
</head>

<body>

<h2>Image Viewer</h2>

<img id="imgview">

<script>
const params = new URLSearchParams(window.location.search);
const img = params.get("img");

if(img){
    document.getElementById("imgview").src = img;
}
</script>

</body>
</html>
