<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inventory Image Viewer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

#top{
padding:10px;
background:#222;
}

#search{
width:300px;
padding:6px;
font-size:16px;
}

#viewer{
text-align:center;
padding:10px;
overflow:auto;
}

#viewer img{
max-width:95%;
max-height:70vh;
box-shadow:0 0 20px black;
transition:transform 0.1s;
cursor:zoom-in;
}

#gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.thumb{
width:120px;
cursor:pointer;
border:2px solid #333;
}

.thumb:hover{
border:2px solid #00aaff;
}

</style>
</head>

<body>

<div id="top">
Search :
<input id="search" placeholder="ค้นหาสินค้า">
</div>

<div id="viewer">
<img id="mainimg">
</div>

<div id="gallery"></div>

<script>

let data=[]
let zoom=1

const mainimg=document.getElementById("mainimg")
const gallery=document.getElementById("gallery")
const search=document.getElementById("search")

fetch("images.json")
.then(res => res.json())
.then(json => {

data=json
renderGallery(data)
loadImageFromURL()

})

// render thumbnail
function renderGallery(list){

gallery.innerHTML=""

list.forEach(item => {

let img=document.createElement("img")

img.src=item.url
img.className="thumb"

img.onclick=function(){
showImage(item.url)
}

gallery.appendChild(img)

})

}

// show main image
function showImage(url){

mainimg.src=url
zoom=1
mainimg.style.transform="scale(1)"

}

// search
search.addEventListener("keyup",function(){

let keyword=this.value.toLowerCase()

let filtered=data.filter(item =>
item.name.toLowerCase().includes(keyword)
)

renderGallery(filtered)

if(filtered.length>0){
showImage(filtered[0].url)
}

})

// excel url
function loadImageFromURL(){

const params=new URLSearchParams(window.location.search)
const img=params.get("img")

if(img){
showImage(img)
}

}

search.focus()

// ZOOM WITH SCROLL
mainimg.addEventListener("wheel",function(e){

e.preventDefault()

if(e.deltaY<0){
zoom+=0.1
}else{
zoom-=0.1
}

if(zoom<0.2) zoom=0.2
if(zoom>5) zoom=5

mainimg.style.transform="scale("+zoom+")"

})

// DOUBLE CLICK RESET
mainimg.addEventListener("dblclick",function(){

zoom=1
mainimg.style.transform="scale(1)"

})

</script>

</body>
</html>
