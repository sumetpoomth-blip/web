<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inventory Image Viewer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

#top{
padding:10px;
background:#222;
}

#search{
width:300px;
padding:6px;
font-size:16px;
}

#viewer{
text-align:center;
padding:10px;
}

#viewer img{
max-width:95%;
max-height:70vh;
}

#gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.thumb{
width:120px;
cursor:pointer;
border:2px solid #333;
}

.thumb:hover{
border:2px solid #00aaff;
}

</style>
</head>

<body>

<div id="top">
Search :
<input id="search" placeholder="ค้นหาสินค้า">
</div>

<div id="viewer">
<img id="mainimg">
</div>

<div id="gallery"></div>

<script>

let data=[]
const mainimg=document.getElementById("mainimg")

fetch("images.json")
.then(r=>r.json())
.then(j=>{
data=j
render(data)
loadFromURL()
})

function render(list){

const g=document.getElementById("gallery")
g.innerHTML=""

list.forEach(i=>{

let img=document.createElement("img")

img.src=i.url
img.className="thumb"

img.onclick=()=>{
showImage(i.url)
}

g.appendChild(img)

})

}

function showImage(url){

mainimg.src=url

}

document.getElementById("search").onkeyup=function(){

let k=this.value.toLowerCase()

let filtered=data.filter(x=>
x.name.toLowerCase().includes(k)
)

render(filtered)

}

function loadFromURL(){

const params=new URLSearchParams(window.location.search)
const img=params.get("img")

if(img){
showImage(img)
}

}

</script>

</body>
</html>
