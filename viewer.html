<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inventory Image Viewer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

#top{
padding:10px;
background:#222;
}

#search{
width:300px;
padding:6px;
font-size:16px;
}

#viewer{

height:70vh;
overflow:auto;
border-top:1px solid #333;
border-bottom:1px solid #333;

display:flex;
justify-content:center;
align-items:center;

cursor:grab;
}

#viewer img{

transition:transform 0.1s;
max-width:none;

}

#toolbar{
padding:10px;
text-align:center;
background:#1b1b1b;
}

button{

padding:6px 12px;
font-size:16px;
margin:4px;
cursor:pointer;

}

#gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.thumb{
width:120px;
cursor:pointer;
border:2px solid #333;
}

.thumb:hover{
border:2px solid #00aaff;
}

</style>
</head>

<body>

<div id="top">
Search :
<input id="search" placeholder="ค้นหาสินค้า">
</div>

<div id="toolbar">

<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">-</button>
<button onclick="resetZoom()">Reset</button>

</div>

<div id="viewer">
<img id="mainimg">
</div>

<div id="gallery"></div>

<script>

let data=[]
let zoom=1

const mainimg=document.getElementById("mainimg")
const gallery=document.getElementById("gallery")
const search=document.getElementById("search")
const viewer=document.getElementById("viewer")

fetch("images.json")
.then(res=>res.json())
.then(json=>{

data=json

renderGallery(data)

loadImageFromURL()

})

// render thumbnail
function renderGallery(list){

gallery.innerHTML=""

list.forEach(item=>{

let img=document.createElement("img")

img.src=item.url
img.className="thumb"

img.onclick=function(){
showImage(item.url)
}

gallery.appendChild(img)

})

}

// show main image
function showImage(url){

mainimg.src=url
zoom=1
applyZoom()

}

// zoom functions
function zoomIn(){

zoom+=0.2
applyZoom()

}

function zoomOut(){

zoom-=0.2

if(zoom<0.2) zoom=0.2

applyZoom()

}

function resetZoom(){

zoom=1
applyZoom()

}

function applyZoom(){

mainimg.style.transform="scale("+zoom+")"

}

// search
search.addEventListener("keyup",function(){

let keyword=this.value.toLowerCase()

let filtered=data.filter(item=>
item.name.toLowerCase().includes(keyword)
)

renderGallery(filtered)

if(filtered.length>0){
showImage(filtered[0].url)
}

})

// excel link
function loadImageFromURL(){

const params=new URLSearchParams(window.location.search)

const img=params.get("img")

if(img){
showImage(img)
}

}

search.focus()

// drag image

let isDown=false
let startX
let startY
let scrollLeft
let scrollTop

viewer.addEventListener("mousedown",e=>{

isDown=true
viewer.style.cursor="grabbing"

startX=e.pageX-viewer.offsetLeft
startY=e.pageY-viewer.offsetTop

scrollLeft=viewer.scrollLeft
scrollTop=viewer.scrollTop

})

viewer.addEventListener("mouseleave",()=>{

isDown=false
viewer.style.cursor="grab"

})

viewer.addEventListener("mouseup",()=>{

isDown=false
viewer.style.cursor="grab"

})

viewer.addEventListener("mousemove",e=>{

if(!isDown) return

e.preventDefault()

const x=e.pageX-viewer.offsetLeft
const y=e.pageY-viewer.offsetTop

const walkX=(x-startX)
const walkY=(y-startY)

viewer.scrollLeft=scrollLeft-walkX
viewer.scrollTop=scrollTop-walkY

})

</script>

</body>
</html>
