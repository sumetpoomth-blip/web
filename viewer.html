<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inventory Image Viewer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

#top{
padding:10px;
background:#222;
}

#search{
width:300px;
padding:6px;
font-size:16px;
}

#viewer{
text-align:center;
padding:10px;
}

#viewer img{
max-width:95%;
max-height:70vh;
box-shadow:0 0 20px black;
}

#gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.thumb{
width:120px;
cursor:pointer;
border:2px solid #333;
}

.thumb:hover{
border:2px solid #00aaff;
}

</style>
</head>

<body>

<div id="top">
Search :
<input id="search" placeholder="ค้นหา Serial Number">
</div>

<div id="viewer">
<img id="mainimg">
</div>

<div id="gallery"></div>

<script>

let data=[]
const mainimg=document.getElementById("mainimg")
const gallery=document.getElementById("gallery")
const search=document.getElementById("search")

// โหลดรายการรูป
fetch("images.json")
.then(res => res.json())
.then(json => {

data=json

renderGallery(data)

loadImageFromURL()

})

// สร้าง thumbnail
function renderGallery(list){

gallery.innerHTML=""

list.forEach(item => {

let img=document.createElement("img")

img.src=item.url
img.className="thumb"

img.onclick=function(){
showImage(item.url)
}

gallery.appendChild(img)

})

}

// แสดงรูปใหญ่
function showImage(url){

mainimg.src=url

}

// ค้นหา
search.addEventListener("keyup",function(){

let keyword=this.value.toLowerCase()

let filtered=data.filter(item =>
item.name.toLowerCase().includes(keyword)
)

renderGallery(filtered)

// เปลี่ยนรูปใหญ่ตามผลลัพธ์แรก
if(filtered.length>0){
showImage(filtered[0].url)
}

})

// รับค่าจาก Excel
function loadImageFromURL(){

const params=new URLSearchParams(window.location.search)

const img=params.get("img")

if(img){
showImage(img)
}

}

</script>

</body>
</html>
