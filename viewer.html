<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Image Viewer</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

/* top bar */

#topbar{
    background:#222;
    padding:10px;
    display:flex;
    gap:10px;
    align-items:center;
}

/* search */

#search{
    padding:5px;
    width:200px;
}

/* zoom buttons */

button{
    padding:5px 10px;
    cursor:pointer;
}

/* viewer */

#viewer{
    width:100%;
    height:70vh;
    overflow:auto;
    background:#000;
    text-align:center;
}

/* image */

#imgview{
    display:block;
    margin:auto;
}

/* thumbnails */

#thumbs{
    background:#222;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.thumb{
    width:80px;
    height:80px;
    object-fit:cover;
    cursor:pointer;
    border:2px solid #444;
}

.thumb:hover{
    border:2px solid white;
}

</style>

</head>

<body>

<div id="topbar">

<input id="search" placeholder="Search image">

<button onclick="zoomIn()">+</button> <button onclick="zoomOut()">-</button> <button onclick="resetZoom()">Reset</button>

</div>

<div id="viewer">
<img id="imgview">
</div>

<div id="thumbs"></div>

<script>

/* CONFIG */

const baseURL =
"https://sumetpoomth-blip.github.io/web/imginv/com/"

/* image list */

const images = [
"15DT992",
"15DT993",
"15DT994",
"15DT995",
"15DT996",
"15DT997"
]



/* elements */

const imgview = document.getElementById("imgview")
const thumbs = document.getElementById("thumbs")
const search = document.getElementById("search")


/* zoom */

let scale = 1
let originalWidth = 0


imgview.onload = function(){

    originalWidth = imgview.naturalWidth
    resetZoom()

}


/* open image */

function openImage(name){

    imgview.src = baseURL + name + ".jpg"

}


/* create thumbnails */

function showThumb(list){

    thumbs.innerHTML=""

    list.forEach(name=>{

        let img = document.createElement("img")

        img.src = baseURL + name + ".jpg"

        img.className="thumb"

        img.onclick = function(){

            openImage(name)

        }

        thumbs.appendChild(img)

    })

}



/* search */

search.addEventListener("input",function(){

    let keyword = this.value.toLowerCase()

    let result = images.filter(x=>x.toLowerCase().includes(keyword))

    showThumb(result)

    if(result.length>0){
        openImage(result[0])
    }

})



/* zoom functions */

function zoomIn(){

    scale += 0.2
    updateZoom()

}

function zoomOut(){

    scale -= 0.2

    if(scale<0.2) scale=0.2

    updateZoom()

}

function resetZoom(){

    scale = 1
    updateZoom()

}

function updateZoom(){

    imgview.style.width = (originalWidth * scale) + "px"
    imgview.style.height = "auto"

}



/* load from excel link */

const params = new URLSearchParams(window.location.search)

const img = params.get("img")

if(img){

    imgview.src = img

}else{

    openImage(images[0])

}



/* initial thumbnails */

showThumb(images)



</script>

</body>
</html>
