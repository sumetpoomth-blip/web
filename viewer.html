<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Image Viewer</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    margin:0;
}

/* top menu */

#topbar{
    padding:10px;
    background:#222;
    position:sticky;
    top:0;
    z-index:10;
}

#search{
    width:200px;
    padding:5px;
}

button{
    padding:5px 10px;
    margin-left:5px;
}

/* viewer area */

#viewer{
    width:100%;
    height:65vh;
    overflow:auto;
    background:#000;
    text-align:center;
}

/* image */

#imgview{
    transform-origin:center center;
    cursor:grab;
}

/* thumbnails */

#thumbs{
    background:#111;
    padding:10px;
    white-space:nowrap;
    overflow-x:auto;
}

.thumb{
    height:80px;
    margin:5px;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="topbar">

Search :
<input id="search" placeholder="ชื่อสินค้า">

<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">-</button>
<button onclick="resetZoom()">Reset</button>

</div>


<div id="viewer">
<img id="imgview">
</div>


<div id="thumbs"></div>


<script>

let scale = 1

const imgview = document.getElementById("imgview")
const viewer = document.getElementById("viewer")
const thumbs = document.getElementById("thumbs")

/* โหลดรูปจาก Excel parameter */

const params = new URLSearchParams(window.location.search)
const img = params.get("img")

if(img){
    imgview.src = img
}


/* Zoom buttons */

function zoomIn(){
    scale += 0.2
    updateZoom()
}

function zoomOut(){
    scale -= 0.2
    if(scale < 0.2) scale = 0.2
    updateZoom()
}

function resetZoom(){
    scale = 1
    updateZoom()
}

function updateZoom(){
    imgview.style.transform = "scale("+scale+")"
}


/* drag image */

let isDown = false
let startX
let startY
let scrollLeft
let scrollTop

viewer.addEventListener("mousedown", (e)=>{

    isDown = true
    imgview.style.cursor = "grabbing"

    startX = e.pageX
    startY = e.pageY

    scrollLeft = viewer.scrollLeft
    scrollTop = viewer.scrollTop

})

viewer.addEventListener("mouseleave", ()=>{

    isDown = false
    imgview.style.cursor = "grab"

})

viewer.addEventListener("mouseup", ()=>{

    isDown = false
    imgview.style.cursor = "grab"

})

viewer.addEventListener("mousemove", (e)=>{

    if(!isDown) return

    e.preventDefault()

    const x = e.pageX - startX
    const y = e.pageY - startY

    viewer.scrollLeft = scrollLeft - x
    viewer.scrollTop = scrollTop - y

})


/* image database */

const images = [

{ name:"15DT992", url:"imginv/com/15DT992.jpg" },
{ name:"15DT993", url:"imginv/com/15DT993.jpg" },
{ name:"15DT994", url:"imginv/com/15DT994.jpg" }

]

/* show thumbnails */

function showThumb(list){

    thumbs.innerHTML=""

    list.forEach(img=>{

        const t = document.createElement("img")

        t.src = img.url
        t.className="thumb"

        t.onclick = ()=>{

            imgview.src = img.url
            resetZoom()

        }

        thumbs.appendChild(t)

    })

}

/* search */

document.getElementById("search").addEventListener("input", function(){

    const key = this.value.toLowerCase()

    const result = images.filter(i =>
        i.name.toLowerCase().includes(key)
    )

    showThumb(result)

    if(result.length > 0){

        imgview.src = result[0].url
        resetZoom()

    }

})

/* initial */

showThumb(images)

</script>

</body>
</html>
